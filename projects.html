<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects — Samaira Karmarkar</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Homemade+Apple&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="nav">
  <a href="index.html">home</a>
  <a href="about.html">about me</a>
  <a href="writing.html">writing</a>
  <a href="projects.html" class="active">projects</a>
  <a href="resume.html">resume</a>
</nav>

<main class="page" style="max-width:1180px;">

  <h1 class="page-title">my <span class="mark">projects</span></h1>
  <p class="page-lead">my life into folders — pull a tab to open it.</p>

  <section class="folders">

    <div class="folder-stack">

      <button type="button" class="folder f-1" data-folder>
        <div class="folder-tab-label">brand &amp; campaign</div>
        <h3>Designers &amp; Business — Promo Kit</h3>
        <div class="folder-body">
          A recurring set of promotional deliverables for a Kelley student org:
          event posters, story templates, recap carousels, and a lightweight
          brand system that keeps the visual identity consistent across semesters.
          Tools: Figma, Canva, light Adobe.
        </div>
      </button>

      <div class="folder-with-link">
        <button type="button" class="folder f-2" data-folder>
          <div class="folder-tab-label">writing</div>
          <h3>Essays on Medium</h3>
          <div class="folder-body">
            Short essays on systems, risk, fairness, and the quiet mechanics of
            everyday value — arranged on the writing page as a small bookshelf
            so each piece reads like its own little book.
            <span class="folder-link"><a href="writing.html">→ open the writing page</a></span>
          </div>
        </button>
      </div>

      <button type="button" class="folder f-3" data-folder>
        <div class="folder-tab-label">painting</div>
        <h3>Oil &amp; Acrylic Studies</h3>
        <div class="folder-body">
          An ongoing personal practice — small canvases, portrait studies, and
          the occasional wall piece. Mostly soft palettes, slow brushwork, and
          an interest in light on ordinary things.
        </div>
      </button>

      <button type="button" class="folder f-4" data-folder>
        <div class="folder-tab-label">sewing &amp; textile</div>
        <h3>Hand-Sewn Garments</h3>
        <div class="folder-body">
          Self-drafted patterns and alterations — tops, skirts, and a handful of
          gifts. I like the part of sewing that feels like problem-solving: fit,
          drape, and the tension of a single stitch.
        </div>
      </button>

      <button type="button" class="folder f-6" data-folder>
        <div class="folder-tab-label">cnc &amp; fabrication</div>
        <h3>McDowell STEM — CNC Pieces</h3>
        <div class="folder-body">
          Small CNC-machined pieces produced during my STEM certificate: toolpath
          planning, material setup, and post-processing. The part I liked most
          was watching a digital model become a physical, touch-tested object.
        </div>
      </button>

      <button type="button" class="folder f-5" data-folder>
        <div class="folder-tab-label">video</div>
        <h3>Edits &amp; Short Cuts</h3>
        <div class="folder-body">
          Short-form video edits — event recaps, family archives, and music cuts.
          Pacing, rhythm, and a quiet respect for the source footage are the
          things I care about most.
        </div>
      </button>

    </div>

    <p class="folder-hint">click a folder to open it.</p>
  </section>

</main>

<footer class="footer">
  <a href="index.html">Home</a> ·
  <a href="about.html">About</a> ·
  <a href="writing.html">Writing</a> ·
  <a href="resume.html">Resume</a>
</footer>

<script>
  // Toggle folder open/closed (in addition to the :hover state)
  document.querySelectorAll('[data-folder]').forEach(el => {
    el.addEventListener('click', e => {
      // Don't intercept clicks on inner links
      if (e.target.tagName === 'A') return;
      el.classList.toggle('is-open');
    });
  });
</script>

</body>
</html>

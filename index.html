  <!-- Two horizontal elastic cords -->
  <span class="cord cord-1" aria-hidden="true">
    <span class="cord-peg cord-peg-l"></span>
    <span class="cord-peg cord-peg-r"></span>
  </span>
  <span class="cord cord-2" aria-hidden="true">
    <span class="cord-peg cord-peg-l"></span>
    <span class="cord-peg cord-peg-r"></span>
  </span>

  <!-- Paperclip in the top right -->
  <div class="deco paperclip" aria-hidden="true">
    <svg viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="silver" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0" stop-color="#e8e8e8"/>
          <stop offset="0.5" stop-color="#aaa"/>
          <stop offset="1" stop-color="#777"/>
        </linearGradient>
      </defs>
      <circle cx="30" cy="20" r="14" fill="url(#silver)" stroke="#555" stroke-width="1.2"/>

      <path d="M30 34 Q44 56 30 78 Q16 56 30 34 Z" fill="none" stroke="url(#silver)" stroke-width="3.5" stroke-linecap="round"/>

          <stop offset="1" stop-color="#3d3833"/>

        <radialGradient id="silverScroll" cx="0.5" cy="0.5" r="0.6">
          <stop offset="0" stop-color="#e8e3d6"/>
          <stop offset="0.6" stop-color="#9a9285"/>
          <stop offset="1" stop-color="#3f3a32"/>
        </radialGradient>
      </defs>
      <!-- Outer ornate scrolls -->
      <g fill="url(#silverFrame)" stroke="#2c2722" stroke-width="0.8">
        <!-- top crown scroll -->
        <path d="M180 4
                 C 150 -2 120 8 110 28
                 C 90 18 70 24 60 42

                 L 20 120

                 C 300 70 322 90 320 120
                 L 340 120
                 L 340 60
                 L 330 56
                 C 328 40 310 32 300 42
                 C 290 24 270 18 250 28

                 C 90 442 70 436 60 418
                 C 50 428 32 420 30 404
                 L 20 400
                 L 20 340
                 L 40 340

                 L 180 418
                 L 210 414
                 C 230 408 250 400 268 396
                 C 300 390 322 370 320 340
                 L 340 340
                 L 340 400
                 L 330 404
                 C 328 420 310 428 300 418
                 C 290 436 270 442 250 432
                 C 240 452 210 462 180 456 Z"/>

        <path d="M20 120 L 40 120 L 40 340 L 20 340 Z"/>
        <path d="M320 120 L 340 120 L 340 340 L 320 340 Z"/>
        <!-- side flourishes -->
        <ellipse cx="30" cy="200" rx="18" ry="22" fill="url(#silverScroll)"/>
        <ellipse cx="30" cy="260" rx="18" ry="22" fill="url(#silverScroll)"/>
        <ellipse cx="330" cy="200" rx="18" ry="22" fill="url(#silverScroll)"/>
        <ellipse cx="330" cy="260" rx="18" ry="22" fill="url(#silverScroll)"/>

        <circle cx="180" cy="34" r="11" fill="url(#silverScroll)"/>
        <circle cx="180" cy="426" r="11" fill="url(#silverScroll)"/>
      </g>
      <!-- Inner bezel -->
      <rect x="58" y="78" width="244" height="304" fill="none" stroke="#2c2722" stroke-width="2"/>
      <rect x="60" y="80" width="240" height="300" fill="#cdb89a"/>
      <rect x="62" y="82" width="236" height="296" fill="#d8c3a3"/>
